<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFCO TaaS — AECOC Valencia 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---------- Reset & base ---------- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: #1f2937; background: #ffffff; font-size: 14px; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }
  img { display: block; max-width: 100%; }

  /* ---------- Layout ---------- */
  .app { display: grid; grid-template-columns: 240px 1fr; height: 100vh; overflow: hidden; }
  .sidebar { background: #ffffff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; padding: 20px 0; }
  .sidebar-logo { padding: 4px 24px 28px 24px; }
  .sidebar-logo img { height: 36px; width: auto; display: block; }
  .nav { flex: 1; padding: 0 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 8px; color: #4b5563;
    font-weight: 500; cursor: pointer; margin-bottom: 4px;
    transition: background 0.15s, color 0.15s;
  }
  .nav-item:hover { background: #f3f4f6; color: #1f2937; }
  .nav-item.active { background: #ecfdf5; color: #16a34a; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

  .main { display: flex; flex-direction: column; overflow: hidden; }
  .header {
    background: #ffffff; border-bottom: 1px solid #e5e7eb;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    min-height: 56px;
  }
  .header-info { display: flex; flex-direction: column; gap: 2px; font-size: 12px; color: #6b7280; }
  .header-info strong { color: #1f2937; font-weight: 500; }
  .content { flex: 1; position: relative; overflow: hidden; }

  /* ---------- Map view ---------- */
  #mapView { position: absolute; inset: 0; }
  #map { position: absolute; inset: 0; width: 100%; height: 100%; background: #e8eef3; }
  .leaflet-container { font-family: 'Inter', sans-serif; }

  /* Site marker (brown pin) - sin contar las llaves del flex parent */
  .site-icon-wrap { display: flex; align-items: flex-end; gap: 4px; }
  .site-marker {
    background: #8B4513;
    border: 3px solid #fff;
    border-radius: 50% 50% 50% 0;
    width: 38px; height: 38px;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    flex-shrink: 0;
  }
  .site-marker .icon-wrap { transform: rotate(45deg); display: flex; align-items: center; justify-content: center; color: white; }
  .site-marker .icon-wrap svg { width: 18px; height: 18px; }

  /* Device cluster badge pegado al site (lila con icono signal y número) */
  .device-cluster-badge {
    background: #a855f7;
    border: 3px solid #fff;
    border-radius: 50% 50% 50% 0;
    width: 38px; height: 38px;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    flex-shrink: 0;
    margin-left: -8px;
    position: relative;
  }
  .device-cluster-badge .icon-wrap { transform: rotate(45deg); color: white; display: flex; align-items: center; justify-content: center; }
  .device-cluster-badge .icon-wrap svg { width: 16px; height: 16px; }
  .device-cluster-badge .count {
    position: absolute;
    bottom: -6px; right: -6px;
    background: #fff;
    color: #6d28d9;
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    padding: 0 6px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #a855f7;
    transform: rotate(45deg);
  }

  /* Side panel (slides in from right) */
  .side-panel {
    position: absolute; top: 16px; right: 16px;
    width: 360px; max-height: calc(100% - 32px);
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    overflow: hidden;
    display: flex; flex-direction: column;
    z-index: 1000;
    transform: translateX(calc(100% + 32px));
    transition: transform 0.25s ease;
  }
  .side-panel.open { transform: translateX(0); }
  .side-panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid #f3f4f6;
    display: flex; align-items: center; justify-content: space-between;
  }
  .side-panel-header h3 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .side-panel-header h3 svg { width: 18px; height: 18px; color: #6b7280; }
  .close-btn { padding: 4px; border-radius: 6px; color: #6b7280; }
  .close-btn:hover { background: #f3f4f6; }
  .close-btn svg { width: 18px; height: 18px; display: block; }
  .side-panel-body { overflow-y: auto; padding: 16px 20px; flex: 1; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 500;
    background: #f3f4f6; color: #374151;
  }
  .badge svg { width: 14px; height: 14px; }
  .badge.green { background: #dcfce7; color: #15803d; }
  .badge.blue { background: #dbeafe; color: #1d4ed8; }
  .badge.purple { background: #ede9fe; color: #6d28d9; }
  .badge.orange { background: #ffedd5; color: #c2410c; }
  .badge.red { background: #fee2e2; color: #b91c1c; }
  .badge.yellow { background: #fef3c7; color: #b45309; }
  .badge.gray { background: #f3f4f6; color: #374151; }

  .info-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0;
    font-size: 13px;
  }
  .info-row svg { width: 16px; height: 16px; color: #6b7280; flex-shrink: 0; margin-top: 2px; }
  .info-row .label { color: #6b7280; }
  .info-row .value { color: #1f2937; font-weight: 500; }
  .info-row.stacked { flex-direction: column; gap: 2px; }

  .device-list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    border: 1px solid #f3f4f6;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .device-list-item:hover { border-color: #16a34a; background: #f9fafb; }
  .device-list-item .device-icon {
    width: 36px; height: 36px;
    background: #ede9fe;
    color: #6d28d9;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .device-list-item .device-icon svg { width: 18px; height: 18px; }
  .device-list-item .device-info { flex: 1; min-width: 0; }
  .device-list-item .device-name { font-weight: 600; font-size: 13px; color: #1f2937; }
  .device-list-item .device-sub { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .device-list-item .device-badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .device-list-item .device-badges .badge { font-size: 10px; padding: 2px 8px; }

  /* Panel back link (cuando entras a un device desde la lista de un site) */
  .panel-back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: #16a34a;
    padding: 6px 10px; border-radius: 6px;
    margin-bottom: 12px;
    transition: background 0.15s;
  }
  .panel-back-link:hover { background: #ecfdf5; }
  .panel-back-link svg { width: 14px; height: 14px; }

  .panel-actions {
    display: flex; gap: 8px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid #f3f4f6;
  }
  .btn {
    flex: 1; padding: 8px 12px;
    border-radius: 8px;
    background: #f3f4f6;
    color: #374151;
    font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn:hover { background: #e5e7eb; }
  .btn svg { width: 14px; height: 14px; }
  .btn.primary { background: #16a34a; color: white; }
  .btn.primary:hover { background: #15803d; }

  /* ---------- Device detail view ---------- */
  .device-detail {
    position: absolute; inset: 0;
    overflow-y: auto;
    background: #f9fafb;
    padding: 24px 32px;
  }
  .breadcrumb {
    font-size: 13px; color: #6b7280;
    display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
  }
  .breadcrumb a { color: #16a34a; cursor: pointer; font-weight: 500; }
  .breadcrumb a:hover { text-decoration: underline; }

  .detail-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 12px; flex-wrap: wrap; gap: 12px;
  }
  .detail-title { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .detail-title h1 {
    font-size: 24px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  .detail-title h1 svg { width: 22px; height: 22px; color: #6b7280; }
  .detail-actions { display: flex; gap: 8px; }
  .detail-actions .btn { background: white; border: 1px solid #e5e7eb; padding: 8px 14px; }
  .detail-actions .btn:hover { background: #f9fafb; }

  .detail-summary {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px;
    background: white; padding: 18px 22px;
    border-radius: 12px; border: 1px solid #e5e7eb;
    margin-bottom: 16px;
  }
  .summary-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .summary-row svg { width: 16px; height: 16px; color: #16a34a; flex-shrink: 0; }
  .summary-row .label { color: #16a34a; font-weight: 500; min-width: 100px; }
  .summary-row .value { color: #1f2937; }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    border-bottom: 1px solid #e5e7eb;
    position: sticky; top: -1px;
    background: #f9fafb;
    z-index: 5;
    padding-top: 4px;
  }
  .tab {
    padding: 10px 18px;
    font-size: 13px; font-weight: 500;
    color: #6b7280; cursor: pointer;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; gap: 6px;
    margin-bottom: -1px;
  }
  .tab:hover { color: #1f2937; }
  .tab.active { color: #16a34a; border-color: #16a34a; }
  .tab svg { width: 14px; height: 14px; }
  .tab .tab-badge {
    background: #ef4444; color: white;
    font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 8px;
  }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }

  .card {
    background: white;
    padding: 20px 22px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
  }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: #1f2937; }

  .card .info-row { padding: 6px 0; }
  .card .info-row .label { min-width: 140px; }

  .additional-info { display: grid; grid-template-columns: 1fr 240px; gap: 24px; }
  @media (max-width: 700px) { .additional-info { grid-template-columns: 1fr; } }
  .additional-info-fields { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px 24px; }
  @media (max-width: 700px) { .additional-info-fields { grid-template-columns: 1fr 1fr; } }
  .additional-info img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: 10px;
    background: #f3f4f6;
  }
  .field-block .field-label { font-size: 12px; color: #6b7280; margin-bottom: 2px; }
  .field-block .field-value { font-size: 14px; font-weight: 500; color: #1f2937; }

  /* Temperature chart */
  .temp-chart-wrap { background: white; padding: 20px 22px; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 16px; }
  .temp-chart-wrap h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .temp-chart-subtitle { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
  .chart-legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; font-size: 12px; color: #4b5563; }
  .chart-legend .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; background: white; }
  svg.temp-chart { width: 100%; height: 280px; }

  /* Journey */
  .journey-list { display: flex; flex-direction: column; gap: 10px; }
  .journey-item {
    background: white; border: 1px solid #e5e7eb;
    border-left: 4px solid #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
  }
  .journey-item.alert { border-left-color: #ef4444; }
  .journey-item.started { border-left-color: #8b5cf6; }
  .journey-item.finished { border-left-color: #10b981; }
  .journey-item.info { border-left-color: #f59e0b; }
  .journey-row {
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .journey-item.expandable .journey-row:hover { background: #fafafa; }
  .journey-right { display: flex; align-items: center; gap: 8px; }
  .journey-toggle {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; color: #6b7280;
    transition: background 0.15s, transform 0.2s;
  }
  .journey-toggle:hover { background: #f3f4f6; }
  .journey-toggle svg { width: 16px; height: 16px; }
  .journey-item.expanded .journey-toggle { transform: rotate(180deg); }
  .journey-content { flex: 1; }
  .journey-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 500; color: #1f2937;
    flex-wrap: wrap;
  }
  .journey-title svg { width: 16px; height: 16px; color: #6b7280; }
  .journey-meta {
    font-size: 12px; color: #6b7280;
    margin-top: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .journey-meta svg { width: 12px; height: 12px; }

  /* Journey expanded block */
  .journey-expanded {
    border-top: 1px solid #f3f4f6;
    padding: 16px 22px 18px 22px;
    background: #fafafa;
    display: none;
  }
  .journey-item.expanded .journey-expanded { display: block; }
  .journey-expanded-header { margin-bottom: 14px; }
  .journey-expanded-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px 32px;
  }
  @media (max-width: 700px) { .journey-expanded-grid { grid-template-columns: 1fr; } }
  .journey-detail-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: #6b7280; margin-bottom: 8px;
  }
  .journey-detail-list { display: flex; flex-direction: column; gap: 6px; }
  .journey-detail-row { font-size: 13px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .journey-detail-key { color: #6b7280; }
  .journey-detail-val { color: #1f2937; font-weight: 500; }

  /* Journey stats block (ruta finalizada) */
  .journey-stats-grid { display: flex; flex-direction: column; gap: 14px; }
  .journey-stat-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .journey-stat-label {
    font-size: 14px; font-weight: 500; color: #1f2937;
    display: flex; align-items: center; gap: 8px;
  }
  .journey-stat-label svg { width: 16px; height: 16px; color: #6b7280; }
  .journey-stat-divider { height: 1px; background: #e5e7eb; margin: 2px 0; }
  .journey-stat-cells {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  }
  .journey-stat-cell {
    display: flex; flex-direction: column; gap: 4px;
  }
  .journey-stat-cell-label {
    font-size: 12px; color: #6b7280;
    display: flex; align-items: center; gap: 6px;
  }
  .journey-stat-cell-label svg { width: 14px; height: 14px; }
  .journey-stat-cell-value { font-size: 18px; font-weight: 600; }
  .journey-stat-footnote {
    font-size: 12px; color: #6b7280;
    padding-top: 8px;
    border-top: 1px solid #f3f4f6;
    line-height: 1.5;
  }
  .journey-stat-footnote strong { color: #16a34a; }

  /* Hidden helper */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="./ifco-logo.svg" alt="IFCO">
    </div>
    <nav class="nav">
      <div class="nav-item active" data-view="map" id="navMap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
        Map
      </div>
      <div class="nav-item" data-view="devices" id="navDevices">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        Devices
      </div>
    </nav>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <header class="header">
      <div class="header-info">
        <span><strong>Zona horaria:</strong> Europe/Madrid</span>
        <span><strong>Unidades:</strong> Metros | °C</span>
      </div>
    </header>

    <div class="content">
      <!-- MAP VIEW -->
      <div id="mapView">
        <div id="map"></div>

        <!-- Side panel (Site or Device detail summary) -->
        <div class="side-panel" id="sidePanel">
          <div class="side-panel-header">
            <h3 id="sidePanelTitle">—</h3>
            <button class="close-btn" id="sidePanelClose" aria-label="Cerrar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="side-panel-body" id="sidePanelBody"></div>
        </div>
      </div>

      <!-- DEVICE DETAIL VIEW -->
      <div id="deviceDetailView" class="device-detail hidden"></div>

      <!-- DEVICES LIST VIEW -->
      <div id="devicesListView" class="device-detail hidden"></div>

    </div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="./data.js?v=6"></script>
<script src="./app.js?v=6"></script>
</body>
</html>
